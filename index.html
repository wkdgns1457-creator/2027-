<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>📅 2027 대입 면접 일정</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }

#topBar {
  background:white;
  padding:15px 20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#controls { display:flex; gap:10px; flex-wrap:wrap; }

#main { display:flex; gap:20px; padding:20px; }

#calendar {
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
}

#sidePanel {
  width:320px;
  background:white;
  padding:15px;
  border-radius:10px;
  height:85vh;
  overflow-y:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.fc .fc-button {
  background:#e8eaed;
  color:#202124;
  border:none;
  border-radius:20px;
  font-weight:500;
  padding:6px 12px;
}
.fc .fc-button:hover {
  background:#d2e3fc;
  color:#1967d2;
}
.fc .fc-button-primary:not(:disabled).fc-button-active {
  background:#1a73e8;
  color:white;
}
.fc .fc-today-button {
  background:#1a73e8 !important;
  color:white !important;
  font-weight:bold;
}

.fc .fc-toolbar-title {
  margin:0 15px;
  font-size:20px;
  font-weight:bold;
}
.fc .fc-toolbar-chunk {
  display:flex;
  align-items:center;
  gap:10px;
}

.type-btn {
  padding:6px 10px;
  margin:3px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  opacity:0.6;
}
.type-btn.active { opacity:1; font-weight:bold; }

.green { background:#34a853; color:white; }
.blue { background:#4285f4; color:white; }
.red { background:#ea4335; color:white; }

.today-highlight { background:#fff3cd !important; }
</style>
</head>

<body>

<div id="topBar">
  <h2>📅 2027 대입 면접 일정</h2>

  <div id="controls">
    <select id="classFilter"><option value="all">전체 반</option></select>
    <input id="nameFilter" placeholder="이름 검색">
    <input type="file" id="fileInput">
    <button onclick="downloadExcel()">엑셀 다운로드</button>
  </div>
</div>

<div id="main">
  <div id="calendar"></div>

  <div id="sidePanel">
    <h3 id="selectedDateTitle">날짜 선택</h3>
    <div id="dayList">날짜를 클릭하세요</div>

    <hr>

    <input id="m_name" placeholder="이름"><br>
    <input id="m_university" placeholder="대학명"><br>
    <input id="m_major" placeholder="모집단위"><br>
    <input id="m_class" placeholder="반"><br>
    <input id="m_number" placeholder="번호"><br>

    <p>유형 선택</p>
    <button class="type-btn green" onclick="selectType('면접', this)">면접</button>
    <button class="type-btn blue" onclick="selectType('실기', this)">실기</button>
    <button class="type-btn red" onclick="selectType('논술', this)">논술</button>

    <br><br>
    <button onclick="addEvent()">추가</button>
  </div>
</div>

<script>
// Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyBMmjOijsLy-WeWIedLSOvkAvZZLxv675o",
    authDomain: "hexagon-8d950.firebaseapp.com",
    projectId: "hexagon-8d950",
    storageBucket: "hexagon-8d950.firebasestorage.app",
    messagingSenderId: "883086752996",
    appId: "1:883086752996:web:3290e8f9364df137ff40f1",
    measurementId: "G-GQMV32C0T8"
  };


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let calendar;
let allData = [];
let selectedDate = null;
let selectedType = null;

// 날짜 파싱
function parseDate(d){
  if(!d) return null;
  if(typeof d==='number'){
    const date=new Date((d-25569)*86400*1000);
    return date.toISOString().split('T')[0];
  }
  if(typeof d==='string' && d.includes('~')){
    return d.split('~')[0].trim();
  }
  return d.trim();
}

// 유형 선택
function selectType(type, el){
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(btn=>btn.classList.remove('active'));
  el.classList.add('active');
}

// 캘린더
function initCalendar(){
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView:'dayGridMonth',
    locale:'ko',
    editable:true,

    headerToolbar:{
      left:'',
      center:'prev title next',
      right:'today'
    },

    dayCellClassNames(arg){
      const today = new Date().toISOString().split('T')[0];
      if(arg.dateStr===today) return ['today-highlight'];
    },

    dateClick(info){
      selectedDate = info.dateStr;
      selectedDateTitle.innerText = info.dateStr + " 일정";
      renderDayList();
    },

    eventClick(info){
      if(confirm("삭제하시겠습니까?")){
        db.collection('events').doc(info.event.id).delete();
      }
    },

    eventDrop(info){
      db.collection('events').doc(info.event.id)
        .update({date:info.event.startStr});
    }
  });

  calendar.render();
}

// 일정 추가
function addEvent(){
  if(!selectedDate){ alert("날짜 선택"); return; }
  if(!selectedType){ alert("유형 선택"); return; }

  db.collection('events').add({
    name:m_name.value,
    university:m_university.value,
    major:m_major.value,
    class:m_class.value,
    number:m_number.value,
    type:selectedType,
    date:selectedDate
  });

  m_name.value="";
  m_university.value="";
  m_major.value="";
  m_class.value="";
  m_number.value="";
  selectedType=null;
  document.querySelectorAll('.type-btn').forEach(btn=>btn.classList.remove('active'));
}

// 목록
function renderDayList(){
  const list = allData.filter(e=>e.date===selectedDate);

  if(list.length===0){
    dayList.innerHTML="일정 없음";
    return;
  }

  dayList.innerHTML = list.map(e =>
    `${e.class}반 ${e.number}번 ${e.name}<br>
     ${e.university||''} ${e.major||''} (${e.type})`
  ).join('<hr>');
}

// 반 필터 정렬
function updateClassFilter(){
  const classes = [...new Set(allData.map(e=>e.class))]
    .filter(c=>c!=null)
    .sort((a,b)=>Number(a)-Number(b));

  classFilter.innerHTML='<option value="all">전체 반</option>';

  classes.forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c;
    opt.textContent=c+'반';
    classFilter.appendChild(opt);
  });
}

// 캘린더 렌더
function renderEvents(){
  const c = classFilter.value;
  const n = nameFilter.value;

  const filtered = allData.filter(e =>
    (c==='all'||e.class==c) &&
    (!n || e.name.includes(n))
  );

  calendar.removeAllEvents();

  calendar.addEventSource(filtered.map(e=>{
    let color='#999';
    if(e.type==='면접') color='#34a853';
    if(e.type==='실기') color='#4285f4';
    if(e.type==='논술') color='#ea4335';

    return {
      id:e.id,
      title:`${e.name}\n${e.university||''} ${e.major||''}`,
      start:e.date,
      backgroundColor:color
    };
  }));
}

// 실시간
db.collection('events').onSnapshot(snap=>{
  allData = snap.docs.map(d=>({id:d.id,...d.data()}));
  updateClassFilter();
  renderEvents();
  renderDayList();
});

classFilter.onchange = renderEvents;
nameFilter.oninput = renderEvents;

// ⭐ 엑셀 업로드 (불합격 필터 포함)
fileInput.addEventListener('change', e=>{
  const reader=new FileReader();

  reader.onload=evt=>{
    const wb=XLSX.read(evt.target.result,{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(sheet);

    function getValue(row, keys){
      for(let k of keys){
        if(row[k]!==undefined) return row[k];
      }
      return null;
    }

    json.forEach(row=>{

      // 🔥 불합격 필터
      const stage = getValue(row,['1단계','1단계 결과','결과']);
      if(stage && String(stage).includes('불합격')){
        return; // 이 행은 무시
      }

      const base={
        class:getValue(row,['반']),
        number:getValue(row,['번호']),
        name:getValue(row,['이름','성명']),
        university:getValue(row,['대학명','학교']),
        major:getValue(row,['모집단위','학과'])
      };

      ['면접','실기','논술'].forEach(type=>{
        const date=parseDate(getValue(row,[type+'일자',type]));
        if(date){
          db.collection('events').add({...base,type,date});
        }
      });
    });

    alert("엑셀 업로드 완료");
  };

  reader.readAsArrayBuffer(e.target.files[0]);
});

// 다운로드
function downloadExcel(){
  if(allData.length===0){
    alert("데이터 없음");
    return;
  }

  const sorted = [...allData].sort((a,b)=>{
    if(a.date !== b.date) return a.date.localeCompare(b.date);
    if(Number(a.class) !== Number(b.class)) return Number(a.class)-Number(b.class);
    return Number(a.number)-Number(b.number);
  });

  const data = sorted.map(e=>({
    날짜:e.date,
    반:e.class,
    번호:e.number,
    이름:e.name,
    대학명:e.university||'',
    모집단위:e.major||'',
    유형:e.type
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "일정");

  XLSX.writeFile(wb, "면접일정.xlsx");
}

initCalendar();
</script>

</body>
</html>
